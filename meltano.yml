version: 1
send_anonymous_usage_stats: true
project_id: "mapper-fivetran"
default_environment: test
environments:
- name: test
plugins:
  extractors:
  - name: tap-smoke-test
    variant: meltano
    pip_url: git+https://github.com/meltano/tap-smoke-test.git
    config:
      streams:
      - stream_name: animals
        input_filename: https://raw.githubusercontent.com/meltano/tap-smoke-test/main/demo-data/animals-data.jsonl

  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl

  mappers:
  - name: "mapper-fivetran"
    namespace: "mapper_fivetran"
    pip_url: -e .

    settings:
    - name: batch_config.storage.root
      kind: string
      description: The root directory where the batch files will be stored. Defaults to the system's temporary directory if not specified.

    # https://docs.meltano.com/guide/mappers/#example-1
    mappings:
    - name: fivetran
